<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1584 396" font-family="'Courier New', monospace">
  <defs>
    <radialGradient id="glow" cx="75%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#070b14" stop-opacity="0"/>
    </radialGradient>
    <pattern id="dots" x="0" y="0" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="#22d3ee" opacity="0.12"/>
    </pattern>
  </defs>

  <!-- Fond -->
  <rect width="1584" height="396" fill="#070b14"/>

  <!-- Motif de points -->
  <rect width="1584" height="396" fill="url(#dots)"/>

  <!-- Glow cyan côté droit -->
  <rect width="1584" height="396" fill="url(#glow)"/>

  <!-- Ligne d'accent en bas -->
  <rect x="0" y="388" width="1584" height="2" fill="#22d3ee" opacity="0.4"/>

  <!-- Ligne décorative verticale gauche -->
  <rect x="80" y="60" width="1.5" height="276" fill="#22d3ee" opacity="0.3"/>

  <!-- Bloc texte principal -->
  <text x="120" y="148" fill="#e2e8f0" font-size="52" font-weight="bold" font-family="'Courier New', monospace" letter-spacing="-1">Raphaël Blessing</text>

  <!-- Séparateur -->
  <rect x="120" y="168" width="320" height="1.5" fill="#22d3ee" opacity="0.6"/>

  <!-- Titre -->
  <text x="120" y="208" fill="#94a3b8" font-size="24" letter-spacing="1">Administrateur systèmes &amp; réseaux</text>
  <text x="120" y="240" fill="#22d3ee" font-size="20" letter-spacing="2">Cybersécurité · Systèmes · Réseaux</text>

  <!-- Tags tech -->
  <rect x="120" y="278" width="130" height="30" rx="6" fill="#0a1929" stroke="#1e3a5f" stroke-width="1"/>
  <text x="185" y="298" text-anchor="middle" fill="#64748b" font-size="14">Proxmox · Linux</text>

  <rect x="264" y="278" width="130" height="30" rx="6" fill="#0a1929" stroke="#1e3a5f" stroke-width="1"/>
  <text x="329" y="298" text-anchor="middle" fill="#64748b" font-size="14">Wireshark · IDS</text>

  <rect x="408" y="278" width="130" height="30" rx="6" fill="#0a1929" stroke="#1e3a5f" stroke-width="1"/>
  <text x="473" y="298" text-anchor="middle" fill="#64748b" font-size="14">Python · Bash</text>

  <rect x="552" y="278" width="160" height="30" rx="6" fill="#0a1929" stroke="#22d3ee" stroke-width="1" opacity="0.7"/>
  <text x="632" y="298" text-anchor="middle" fill="#22d3ee" font-size="14">raphaelblessing.fr</text>

  <!-- Élément décoratif droit — circuit simplifié -->
  <g opacity="0.15" stroke="#22d3ee" stroke-width="1.5" fill="none">
    <rect x="1100" y="80" width="60" height="60" rx="4"/>
    <rect x="1220" y="140" width="60" height="60" rx="4"/>
    <rect x="1340" y="80" width="60" height="60" rx="4"/>
    <rect x="1160" y="240" width="60" height="60" rx="4"/>
    <rect x="1300" y="200" width="60" height="60" rx="4"/>
    <line x1="1160" y1="110" x2="1220" y2="110"/>
    <line x1="1220" y1="110" x2="1220" y2="140"/>
    <line x1="1280" y1="170" x2="1340" y2="170"/>
    <line x1="1340" y1="170" x2="1340" y2="140"/>
    <line x1="1160" y1="110" x2="1160" y2="80"/>
    <line x1="1160" y1="80" x2="1340" y2="80"/>
    <line x1="1190" y1="300" x2="1190" y2="260"/>
    <line x1="1190" y1="260" x2="1300" y2="260"/>
    <line x1="1300" y1="260" x2="1300" y2="260"/>
    <circle cx="1160" cy="110" r="4" fill="#22d3ee"/>
    <circle cx="1280" cy="170" r="4" fill="#22d3ee"/>
    <circle cx="1190" cy="270" r="4" fill="#22d3ee"/>
    <circle cx="1340" cy="110" r="4" fill="#22d3ee"/>
  </g>

  <!-- Lyon · France discret -->
  <text x="120" y="350" fill="#334155" font-size="14" letter-spacing="2">Lyon · France · CONSORT Group</text>
</svg>
