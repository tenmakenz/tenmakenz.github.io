  <line x1="48" y1="48" x2="912" y2="48" stroke="#1e293b" stroke-width="1"/>

  <!-- ======== LAYER CLIENT ======== -->
  <rect x="48" y="64" width="864" height="106" rx="8" fill="#0c1628" stroke="#1e293b" stroke-width="1"/>
  <text x="62" y="82" fill="#334155" font-size="10" letter-spacing="2">CLIENT</text>

