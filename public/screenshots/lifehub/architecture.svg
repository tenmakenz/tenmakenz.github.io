  <text x="308" y="324" fill="#475569" font-size="10">Prisma</text>

  <line x1="666" y1="306" x2="666" y2="334" stroke="#334155" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow)"/>
  <text x="674" y="324" fill="#475569" font-size="10">SDK</text>

