<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 540" font-family="'JetBrains Mono', 'Courier New', monospace">
  <rect width="900" height="540" fill="#0f172a" rx="12"/>

  <!-- Titre -->
  <text x="450" y="40" text-anchor="middle" fill="#94a3b8" font-size="13" letter-spacing="2">ARCHITECTURE SYSTÈME</text>
  <line x1="60" y1="52" x2="840" y2="52" stroke="#1e293b" stroke-width="1"/>

  <!-- ===== COUCHE CLIENT ===== -->
  <text x="80" y="88" fill="#475569" font-size="10" letter-spacing="1">CLIENT</text>
  <rect x="60" y="96" width="780" height="80" rx="8" fill="#0a0f1e" stroke="#1e293b" stroke-width="1"/>

  <!-- PWA -->
  <rect x="80" y="110" width="140" height="52" rx="6" fill="#162033" stroke="#22d3ee" stroke-width="1"/>
  <text x="150" y="132" text-anchor="middle" fill="#22d3ee" font-size="11" font-weight="bold">PWA</text>
  <text x="150" y="148" text-anchor="middle" fill="#64748b" font-size="9">Next.js 14 · App Router</text>
  <text x="150" y="160" text-anchor="middle" fill="#64748b" font-size="9">TypeScript · Tailwind</text>

  <!-- Modules UI -->
  <rect x="240" y="110" width="120" height="52" rx="6" fill="#162033" stroke="#1e293b" stroke-width="1"/>
  <text x="300" y="134" text-anchor="middle" fill="#94a3b8" font-size="10">Dashboard</text>
  <text x="300" y="150" text-anchor="middle" fill="#475569" font-size="9">Vue unifiée</text>

  <rect x="374" y="110" width="120" height="52" rx="6" fill="#162033" stroke="#1e293b" stroke-width="1"/>
  <text x="434" y="134" text-anchor="middle" fill="#94a3b8" font-size="10">Planificateur</text>
  <text x="434" y="150" text-anchor="middle" fill="#475569" font-size="9">Time-blocking</text>

  <rect x="508" y="110" width="120" height="52" rx="6" fill="#162033" stroke="#1e293b" stroke-width="1"/>
  <text x="568" y="134" text-anchor="middle" fill="#94a3b8" font-size="10">Habitudes</text>
  <text x="568" y="150" text-anchor="middle" fill="#475569" font-size="9">Suivi flexible</text>

  <rect x="642" y="110" width="120" height="52" rx="6" fill="#162033" stroke="#1e293b" stroke-width="1"/>
  <text x="702" y="134" text-anchor="middle" fill="#94a3b8" font-size="10">Assistant IA</text>
  <text x="702" y="150" text-anchor="middle" fill="#475569" font-size="9">Chat + suggestions</text>

  <!-- ===== FLÈCHES CLIENT → API ===== -->
  <line x1="450" y1="176" x2="450" y2="206" stroke="#334155" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="446,202 450,210 454,202" fill="#334155"/>
  <text x="460" y="196" fill="#334155" font-size="9">HTTPS / REST</text>

  <!-- ===== COUCHE API ===== -->
  <text x="80" y="228" fill="#475569" font-size="10" letter-spacing="1">API</text>
  <rect x="60" y="236" width="780" height="80" rx="8" fill="#0a0f1e" stroke="#1e293b" stroke-width="1"/>

  <rect x="80" y="250" width="160" height="52" rx="6" fill="#162033" stroke="#22d3ee" stroke-width="1"/>
  <text x="160" y="272" text-anchor="middle" fill="#22d3ee" font-size="11" font-weight="bold">Next.js API Routes</text>
  <text x="160" y="288" text-anchor="middle" fill="#64748b" font-size="9">Route handlers · Middleware</text>
  <text x="160" y="300" text-anchor="middle" fill="#64748b" font-size="9">Auth · Validation (Zod)</text>

  <rect x="260" y="250" width="130" height="52" rx="6" fill="#162033" stroke="#1e293b" stroke-width="1"/>
  <text x="325" y="272" text-anchor="middle" fill="#94a3b8" font-size="10">Tâches API</text>
  <text x="325" y="288" text-anchor="middle" fill="#475569" font-size="9">CRUD · Priorité</text>
  <text x="325" y="300" text-anchor="middle" fill="#475569" font-size="9">Échéances</text>

  <rect x="404" y="250" width="130" height="52" rx="6" fill="#162033" stroke="#1e293b" stroke-width="1"/>
  <text x="469" y="272" text-anchor="middle" fill="#94a3b8" font-size="10">Planif. API</text>
  <text x="469" y="288" text-anchor="middle" fill="#475569" font-size="9">Énergie · Blocs</text>
  <text x="469" y="300" text-anchor="middle" fill="#475569" font-size="9">Conflits</text>

  <rect x="548" y="250" width="130" height="52" rx="6" fill="#162033" stroke="#1e293b" stroke-width="1"/>
  <text x="613" y="272" text-anchor="middle" fill="#94a3b8" font-size="10">LLM API</text>
  <text x="613" y="288" text-anchor="middle" fill="#475569" font-size="9">Provider-agnostic</text>
  <text x="613" y="300" text-anchor="middle" fill="#475569" font-size="9">Streaming</text>

  <rect x="692" y="250" width="130" height="52" rx="6" fill="#162033" stroke="#1e293b" stroke-width="1"/>
  <text x="757" y="272" text-anchor="middle" fill="#94a3b8" font-size="10">Métriques API</text>
  <text x="757" y="288" text-anchor="middle" fill="#475569" font-size="9">Santé · Habitudes</text>
  <text x="757" y="300" text-anchor="middle" fill="#475569" font-size="9">Agrégats</text>

  <!-- ===== FLÈCHES API → DATA ===== -->
  <line x1="300" y1="316" x2="300" y2="346" stroke="#334155" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="296,342 300,350 304,342" fill="#334155"/>
  <text x="260" y="338" fill="#334155" font-size="9">Prisma ORM</text>

  <line x1="613" y1="316" x2="613" y2="346" stroke="#334155" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="609,342 613,350 617,342" fill="#334155"/>
  <text x="620" y="338" fill="#334155" font-size="9">fetch / SDK</text>

  <!-- ===== COUCHE DONNÉES ===== -->
  <text x="80" y="368" fill="#475569" font-size="10" letter-spacing="1">DONNÉES</text>
  <rect x="60" y="376" width="780" height="80" rx="8" fill="#0a0f1e" stroke="#1e293b" stroke-width="1"/>

  <!-- SQLite -->
  <rect x="80" y="392" width="440" height="50" rx="6" fill="#162033" stroke="#22d3ee" stroke-width="1"/>
  <text x="300" y="414" text-anchor="middle" fill="#22d3ee" font-size="11" font-weight="bold">SQLite + Prisma</text>
  <text x="300" y="430" text-anchor="middle" fill="#64748b" font-size="9">Tasks · Habits · TimeBlocks · HealthMetrics · Users · Sessions</text>

  <!-- LLM Providers -->
  <rect x="540" y="392" width="280" height="50" rx="6" fill="#162033" stroke="#7c3aed" stroke-width="1"/>
  <text x="680" y="414" text-anchor="middle" fill="#a78bfa" font-size="11" font-weight="bold">LLM Providers</text>
  <text x="680" y="430" text-anchor="middle" fill="#64748b" font-size="9">OpenAI · Anthropic · Ollama (local)</text>

  <!-- ===== COUCHE DÉPLOIEMENT ===== -->
  <text x="80" y="475" fill="#475569" font-size="10" letter-spacing="1">DÉPLOIEMENT</text>
  <rect x="60" y="483" width="780" height="44" rx="8" fill="#0a0f1e" stroke="#1e293b" stroke-width="1"/>

  <rect x="80" y="493" width="150" height="26" rx="5" fill="#162033" stroke="#f97316" stroke-width="1"/>
  <text x="155" y="510" text-anchor="middle" fill="#fb923c" font-size="10" font-weight="bold">Docker Compose</text>

  <rect x="244" y="493" width="150" height="26" rx="5" fill="#162033" stroke="#1e293b" stroke-width="1"/>
  <text x="319" y="510" text-anchor="middle" fill="#64748b" font-size="10">Caddy · TLS auto</text>

  <rect x="408" y="493" width="150" height="26" rx="5" fill="#162033" stroke="#1e293b" stroke-width="1"/>
  <text x="483" y="510" text-anchor="middle" fill="#64748b" font-size="10">Self-hosted · Proxmox</text>

  <rect x="572" y="493" width="150" height="26" rx="5" fill="#162033" stroke="#1e293b" stroke-width="1"/>
  <text x="647" y="510" text-anchor="middle" fill="#64748b" font-size="10">PWA installable</text>
</svg>
