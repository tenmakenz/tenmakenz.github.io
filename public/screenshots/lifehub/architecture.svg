  <rect x="272" y="472" width="190" height="28" rx="5" fill="#0c1628" stroke="#1e293b" stroke-width="1"/>
  <text x="367" y="491" text-anchor="middle" fill="#64748b" font-size="12">Caddy · TLS auto</text>

  <rect x="476" y="472" width="190" height="28" rx="5" fill="#0c1628" stroke="#1e293b" stroke-width="1"/>
  <text x="571" y="491" text-anchor="middle" fill="#64748b" font-size="12">Proxmox · Self-hosted</text>

  <rect x="680" y="472" width="220" height="28" rx="5" fill="#0c1628" stroke="#1e293b" stroke-width="1"/>
  <text x="790" y="491" text-anchor="middle" fill="#64748b" font-size="12">PWA installable</text>
