  <rect x="564" y="362" width="332" height="52" rx="6" fill="#0a0b1e" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="730" y="384" text-anchor="middle" fill="#a78bfa" font-size="13" font-weight="bold">LLM Providers</text>
  <text x="730" y="403" text-anchor="middle" fill="#475569" font-size="11">OpenAI · Anthropic · Ollama (local)</text>

