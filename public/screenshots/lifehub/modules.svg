<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 500" font-family="'Courier New', monospace">
  <rect width="960" height="500" fill="#070b14" rx="12"/>

  <!-- Titre -->
  <text x="480" y="36" text-anchor="middle" fill="#22d3ee" font-size="11" letter-spacing="4" font-weight="bold">MODÈLE DE DONNÉES — LIFEHUB</text>
  <line x1="48" y1="48" x2="912" y2="48" stroke="#1e293b" stroke-width="1"/>

  <!-- ============ ENTITÉ USER (centre haut) ============ -->
  <rect x="360" y="68" width="240" height="148" rx="8" fill="#0a1929" stroke="#22d3ee" stroke-width="2"/>
  <!-- Header -->
  <rect x="360" y="68" width="240" height="34" rx="8" fill="#22d3ee"/>
  <rect x="360" y="90" width="240" height="12" fill="#22d3ee"/>
  <text x="480" y="90" text-anchor="middle" fill="#070b14" font-size="13" font-weight="bold">User</text>
  <!-- Champs -->
  <text x="376" y="116" fill="#94a3b8" font-size="11">id, email, name</text>
  <text x="376" y="133" fill="#64748b" font-size="11">energyLevel : 1–5</text>
  <text x="376" y="150" fill="#64748b" font-size="11">preferences : JSON</text>
  <text x="376" y="167" fill="#64748b" font-size="11">timezone</text>
  <text x="376" y="184" fill="#22d3ee" font-size="10">⬡ entité centrale</text>
  <text x="376" y="200" fill="#334155" font-size="11">1 ──── N (toutes entités)</text>

  <!-- ============ ENTITÉ TASK (gauche haut) ============ -->
  <rect x="48" y="68" width="240" height="158" rx="8" fill="#0c1628" stroke="#38bdf8" stroke-width="1.5"/>
  <rect x="48" y="68" width="240" height="34" rx="8" fill="#0f2744"/>
  <rect x="48" y="90" width="240" height="12" fill="#0f2744"/>
  <text x="168" y="90" text-anchor="middle" fill="#38bdf8" font-size="13" font-weight="bold">Task</text>
  <text x="64" y="116" fill="#94a3b8" font-size="11">id, title, description</text>
  <text x="64" y="133" fill="#64748b" font-size="11">status : TODO | DONE | SKIP</text>
  <text x="64" y="150" fill="#64748b" font-size="11">priority : 1–4 (Eisenhower)</text>
  <text x="64" y="167" fill="#64748b" font-size="11">dueDate, estimatedMin</text>
  <text x="64" y="184" fill="#64748b" font-size="11">energyRequired : 1–5</text>
  <text x="64" y="207" fill="#1e3a5f" font-size="11">userId →  User</text>

  <!-- ============ ENTITÉ HABIT (droite haut) ============ -->
  <rect x="672" y="68" width="240" height="158" rx="8" fill="#0c1628" stroke="#34d399" stroke-width="1.5"/>
  <rect x="672" y="68" width="240" height="34" rx="8" fill="#062a1e"/>
  <rect x="672" y="90" width="240" height="12" fill="#062a1e"/>
  <text x="792" y="90" text-anchor="middle" fill="#34d399" font-size="13" font-weight="bold">Habit</text>
  <text x="688" y="116" fill="#94a3b8" font-size="11">id, name, description</text>
  <text x="688" y="133" fill="#64748b" font-size="11">frequency : DAILY | WEEKLY</text>
  <text x="688" y="150" fill="#64748b" font-size="11">targetDays : Int[]</text>
  <text x="688" y="167" fill="#64748b" font-size="11">streak : Int</text>
  <text x="688" y="184" fill="#64748b" font-size="11">color, icon</text>
  <text x="688" y="207" fill="#064e3b" font-size="11">userId →  User</text>

  <!-- ============ ENTITÉ TIME BLOCK (gauche bas) ============ -->
  <rect x="48" y="300" width="240" height="168" rx="8" fill="#0c1628" stroke="#818cf8" stroke-width="1.5"/>
  <rect x="48" y="300" width="240" height="34" rx="8" fill="#1a1844"/>
  <rect x="48" y="322" width="240" height="12" fill="#1a1844"/>
  <text x="168" y="322" text-anchor="middle" fill="#818cf8" font-size="13" font-weight="bold">TimeBlock</text>
  <text x="64" y="348" fill="#94a3b8" font-size="11">id, title</text>
  <text x="64" y="365" fill="#64748b" font-size="11">startAt, endAt</text>
  <text x="64" y="382" fill="#64748b" font-size="11">type : WORK | REST | FOCUS</text>
  <text x="64" y="399" fill="#64748b" font-size="11">energyBefore : 1–5</text>
  <text x="64" y="416" fill="#64748b" font-size="11">energyAfter : 1–5</text>
  <text x="64" y="433" fill="#1e293b" font-size="11">userId →  User</text>
  <text x="64" y="452" fill="#1e293b" font-size="11">taskId →  Task (optionnel)</text>

  <!-- ============ ENTITÉ AI CONTEXT (centre bas) ============ -->
  <rect x="360" y="300" width="240" height="158" rx="8" fill="#0c1628" stroke="#a78bfa" stroke-width="1.5"/>
  <rect x="360" y="300" width="240" height="34" rx="8" fill="#1e0a44"/>
  <rect x="360" y="322" width="240" height="12" fill="#1e0a44"/>
  <text x="480" y="322" text-anchor="middle" fill="#a78bfa" font-size="13" font-weight="bold">AIContext</text>
  <text x="376" y="348" fill="#94a3b8" font-size="11">id, provider, model</text>
  <text x="376" y="365" fill="#64748b" font-size="11">messages : JSON[]</text>
  <text x="376" y="382" fill="#64748b" font-size="11">context : snapshot JSON</text>
  <text x="376" y="399" fill="#64748b" font-size="11">tokens : Int</text>
  <text x="376" y="416" fill="#64748b" font-size="11">createdAt</text>
  <text x="376" y="439" fill="#1e1b4b" font-size="11">userId →  User</text>

  <!-- ============ ENTITÉ HEALTH METRIC (droite bas) ============ -->
  <rect x="672" y="300" width="240" height="158" rx="8" fill="#0c1628" stroke="#fb923c" stroke-width="1.5"/>
  <rect x="672" y="300" width="240" height="34" rx="8" fill="#2d0e00"/>
  <rect x="672" y="322" width="240" height="12" fill="#2d0e00"/>
  <text x="792" y="322" text-anchor="middle" fill="#fb923c" font-size="13" font-weight="bold">HealthMetric</text>
  <text x="688" y="348" fill="#94a3b8" font-size="11">id, date</text>
  <text x="688" y="365" fill="#64748b" font-size="11">sleep : Float (heures)</text>
  <text x="688" y="382" fill="#64748b" font-size="11">energy : 1–5</text>
  <text x="688" y="399" fill="#64748b" font-size="11">mood : 1–5</text>
  <text x="688" y="416" fill="#64748b" font-size="11">notes : String</text>
  <text x="688" y="439" fill="#431407" font-size="11">userId →  User</text>

  <!-- ============ RELATIONS ============ -->
  <!-- User → Task -->
  <line x1="360" y1="142" x2="288" y2="142" stroke="#1e3a5f" stroke-width="1.5"/>
  <text x="302" y="136" fill="#334155" font-size="10">1:N</text>

  <!-- User → Habit -->
  <line x1="600" y1="142" x2="672" y2="142" stroke="#064e3b" stroke-width="1.5"/>
  <text x="622" y="136" fill="#334155" font-size="10">1:N</text>

  <!-- User → TimeBlock -->
  <line x1="432" y1="216" x2="168" y2="300" stroke="#1e293b" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="252" y="264" fill="#334155" font-size="10">1:N</text>

  <!-- User → AIContext -->
  <line x1="480" y1="216" x2="480" y2="300" stroke="#1e293b" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="486" y="264" fill="#334155" font-size="10">1:N</text>

  <!-- User → HealthMetric -->
  <line x1="528" y1="216" x2="792" y2="300" stroke="#1e293b" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="660" y="264" fill="#334155" font-size="10">1:N</text>

  <!-- Task → TimeBlock -->
  <line x1="168" y1="226" x2="168" y2="300" stroke="#1a1844" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="174" y="268" fill="#334155" font-size="10">0:1</text>
</svg>
