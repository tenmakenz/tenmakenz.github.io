<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560" font-family="'JetBrains Mono', 'Courier New', monospace">
  <rect width="900" height="560" fill="#0f172a" rx="12"/>

  <!-- Titre -->
  <text x="450" y="40" text-anchor="middle" fill="#94a3b8" font-size="13" letter-spacing="2">MODÈLE DE DONNÉES UNIFIÉ</text>
  <line x1="60" y1="52" x2="840" y2="52" stroke="#1e293b" stroke-width="1"/>

  <!-- ===== ENTITÉ CENTRALE : User ===== -->
  <rect x="355" y="70" width="190" height="110" rx="8" fill="#0a0f1e" stroke="#22d3ee" stroke-width="2"/>
  <rect x="355" y="70" width="190" height="28" rx="8" fill="#22d3ee"/>
  <rect x="355" y="90" width="190" height="10" fill="#22d3ee"/>
  <text x="450" y="89" text-anchor="middle" fill="#0f172a" font-size="12" font-weight="bold">User</text>
  <text x="370" y="114" fill="#64748b" font-size="9">id, email, name</text>
  <text x="370" y="128" fill="#64748b" font-size="9">energyLevel: 1–5</text>
  <text x="370" y="142" fill="#64748b" font-size="9">preferences: JSON</text>
  <text x="370" y="156" fill="#64748b" font-size="9">timezone, createdAt</text>
  <text x="450" y="172" text-anchor="middle" fill="#22d3ee" font-size="9">●──●──●──●──●</text>

  <!-- ===== TASK ===== -->
  <rect x="60" y="68" width="190" height="130" rx="8" fill="#0a0f1e" stroke="#38bdf8" stroke-width="1.5"/>
  <rect x="60" y="68" width="190" height="28" rx="8" fill="#1e3a5f"/>
  <rect x="60" y="88" width="190" height="10" fill="#1e3a5f"/>
  <text x="155" y="87" text-anchor="middle" fill="#38bdf8" font-size="12" font-weight="bold">Task</text>
  <text x="75" y="114" fill="#64748b" font-size="9">id, title, description</text>
  <text x="75" y="128" fill="#64748b" font-size="9">status: TODO|DONE|SKIP</text>
  <text x="75" y="142" fill="#64748b" font-size="9">priority: 1–4 (Eisenhower)</text>
  <text x="75" y="156" fill="#64748b" font-size="9">dueDate, estimatedMin</text>
  <text x="75" y="170" fill="#64748b" font-size="9">energyRequired: 1–5</text>
  <text x="75" y="184" fill="#64748b" font-size="9">userId →</text>

  <!-- ===== HABIT ===== -->
  <rect x="650" y="68" width="190" height="130" rx="8" fill="#0a0f1e" stroke="#34d399" stroke-width="1.5"/>
  <rect x="650" y="68" width="190" height="28" rx="8" fill="#064e3b"/>
  <rect x="650" y="88" width="190" height="10" fill="#064e3b"/>
  <text x="745" y="87" text-anchor="middle" fill="#34d399" font-size="12" font-weight="bold">Habit</text>
  <text x="665" y="114" fill="#64748b" font-size="9">id, name, description</text>
  <text x="665" y="128" fill="#64748b" font-size="9">frequency: DAILY|WEEKLY</text>
  <text x="665" y="142" fill="#64748b" font-size="9">targetDays: Int[]</text>
  <text x="665" y="156" fill="#64748b" font-size="9">streak: Int</text>
  <text x="665" y="170" fill="#64748b" font-size="9">color, icon</text>
  <text x="665" y="184" fill="#64748b" font-size="9">userId →</text>

  <!-- ===== TIME BLOCK ===== -->
  <rect x="60" y="280" width="190" height="130" rx="8" fill="#0a0f1e" stroke="#818cf8" stroke-width="1.5"/>
  <rect x="60" y="280" width="190" height="28" rx="8" fill="#1e1b4b"/>
  <rect x="60" y="300" width="190" height="10" fill="#1e1b4b"/>
  <text x="155" y="299" text-anchor="middle" fill="#818cf8" font-size="12" font-weight="bold">TimeBlock</text>
  <text x="75" y="325" fill="#64748b" font-size="9">id, title</text>
  <text x="75" y="339" fill="#64748b" font-size="9">startAt, endAt</text>
  <text x="75" y="353" fill="#64748b" font-size="9">type: WORK|REST|FOCUS</text>
  <text x="75" y="367" fill="#64748b" font-size="9">taskId → (optionnel)</text>
  <text x="75" y="381" fill="#64748b" font-size="9">energyBefore, energyAfter</text>
  <text x="75" y="395" fill="#64748b" font-size="9">userId →</text>

  <!-- ===== HEALTH METRIC ===== -->
  <rect x="650" y="280" width="190" height="130" rx="8" fill="#0a0f1e" stroke="#fb923c" stroke-width="1.5"/>
  <rect x="650" y="280" width="190" height="28" rx="8" fill="#431407"/>
  <rect x="650" y="300" width="190" height="10" fill="#431407"/>
  <text x="745" y="299" text-anchor="middle" fill="#fb923c" font-size="12" font-weight="bold">HealthMetric</text>
  <text x="665" y="325" fill="#64748b" font-size="9">id, date</text>
  <text x="665" y="339" fill="#64748b" font-size="9">sleep: Float (heures)</text>
  <text x="665" y="353" fill="#64748b" font-size="9">energy: 1–5</text>
  <text x="665" y="367" fill="#64748b" font-size="9">mood: 1–5</text>
  <text x="665" y="381" fill="#64748b" font-size="9">notes: String</text>
  <text x="665" y="395" fill="#64748b" font-size="9">userId →</text>

  <!-- ===== AI CONTEXT ===== -->
  <rect x="355" y="430" width="190" height="110" rx="8" fill="#0a0f1e" stroke="#a78bfa" stroke-width="1.5"/>
  <rect x="355" y="430" width="190" height="28" rx="8" fill="#2e1065"/>
  <rect x="355" y="450" width="190" height="10" fill="#2e1065"/>
  <text x="450" y="449" text-anchor="middle" fill="#a78bfa" font-size="12" font-weight="bold">AIContext</text>
  <text x="370" y="474" fill="#64748b" font-size="9">id, provider: String</text>
  <text x="370" y="488" fill="#64748b" font-size="9">model: String</text>
  <text x="370" y="502" fill="#64748b" font-size="9">messages: JSON[]</text>
  <text x="370" y="516" fill="#64748b" font-size="9">context: snapshot JSON</text>
  <text x="370" y="530" fill="#64748b" font-size="9">userId →</text>

  <!-- ===== RELATIONS ===== -->
  <!-- User → Task -->
  <line x1="355" y1="125" x2="250" y2="125" stroke="#334155" stroke-width="1.5"/>
  <text x="290" y="117" fill="#475569" font-size="9">1</text>
  <text x="260" y="117" fill="#475569" font-size="9">N</text>

  <!-- User → Habit -->
  <line x1="545" y1="125" x2="650" y2="125" stroke="#334155" stroke-width="1.5"/>
  <text x="605" y="117" fill="#475569" font-size="9">1</text>
  <text x="635" y="117" fill="#475569" font-size="9">N</text>

  <!-- User → TimeBlock -->
  <line x1="400" y1="180" x2="210" y2="320" stroke="#334155" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="270" y="255" fill="#475569" font-size="9">1:N</text>

  <!-- User → HealthMetric -->
  <line x1="500" y1="180" x2="690" y2="320" stroke="#334155" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="600" y="255" fill="#475569" font-size="9">1:N</text>

  <!-- Task → TimeBlock -->
  <line x1="155" y1="198" x2="155" y2="280" stroke="#334155" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="162" y="245" fill="#334155" font-size="8">0:1</text>

  <!-- User → AIContext -->
  <line x1="450" y1="180" x2="450" y2="430" stroke="#334155" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="456" y="310" fill="#475569" font-size="9">1:N</text>

  <!-- HabitCompletion (nœud intermédiaire) -->
  <rect x="645" y="210" width="200" height="52" rx="6" fill="#0a0f1e" stroke="#34d399" stroke-width="1" opacity="0.6"/>
  <text x="745" y="232" text-anchor="middle" fill="#34d399" font-size="10">HabitCompletion</text>
  <text x="745" y="248" text-anchor="middle" fill="#475569" font-size="9">habitId · date · done</text>
  <line x1="745" y1="198" x2="745" y2="210" stroke="#334155" stroke-width="1"/>
  <line x1="745" y1="262" x2="745" y2="280" stroke="#334155" stroke-width="1"/>
</svg>
