<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 500" font-family="'Courier New', monospace">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M1,1 L4,4 L1,7" stroke="#475569" stroke-width="1.2" fill="none" stroke-linecap="round"/>
    </marker>
    <marker id="arr-red" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M1,1 L4,4 L1,7" stroke="#f87171" stroke-width="1.2" fill="none" stroke-linecap="round"/>
    </marker>
    <marker id="arr-green" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M1,1 L4,4 L1,7" stroke="#34d399" stroke-width="1.2" fill="none" stroke-linecap="round"/>
    </marker>
  </defs>

  <rect width="960" height="500" fill="#070b14" rx="12"/>
  <text x="480" y="36" text-anchor="middle" fill="#22d3ee" font-size="11" letter-spacing="4" font-weight="bold">ARCHITECTURE RÉSEAU — PARE-FEU + IPS</text>
  <line x1="48" y1="48" x2="912" y2="48" stroke="#1e293b" stroke-width="1"/>

  <!-- ===== INTERNET ===== -->
  <rect x="32" y="190" width="130" height="80" rx="8" fill="#0c1628" stroke="#f87171" stroke-width="1.5"/>
  <text x="97" y="224" text-anchor="middle" fill="#f87171" font-size="13" font-weight="bold">Internet</text>
  <text x="97" y="242" text-anchor="middle" fill="#64748b" font-size="11">5.5.5.5</text>
  <text x="97" y="258" text-anchor="middle" fill="#475569" font-size="10">(VM simulée)</text>

  <!-- ===== PARE-FEU / IPS (centre) ===== -->
  <rect x="370" y="160" width="220" height="140" rx="8" fill="#0a1929" stroke="#22d3ee" stroke-width="2"/>
  <rect x="370" y="160" width="220" height="36" rx="8" fill="#22d3ee"/>
  <rect x="370" y="188" width="220" height="12" fill="#22d3ee"/>
  <text x="480" y="184" text-anchor="middle" fill="#070b14" font-size="13" font-weight="bold">Pare-feu + IPS</text>
  <text x="480" y="214" text-anchor="middle" fill="#94a3b8" font-size="11">nftables · Suricata</text>
  <text x="480" y="230" text-anchor="middle" fill="#64748b" font-size="10">Debian Linux — 4 interfaces</text>
  <!-- Interfaces -->
  <text x="386" y="254" fill="#475569" font-size="10">eth0  66.6.6.1</text>
  <text x="386" y="268" fill="#475569" font-size="10">eth1  66.6.6.5</text>
  <text x="386" y="282" fill="#475569" font-size="10">eth2  10.0.0.1 / 2001::1</text>
  <text x="386" y="296" fill="#475569" font-size="10">eth3  10.0.1.1 / 2001:1::3</text>

  <!-- ===== DMZ PUBLIQUE (haut) ===== -->
  <rect x="360" y="48" width="240" height="88" rx="8" fill="#0c1628" stroke="#fb923c" stroke-width="1.5"/>
  <text x="480" y="72" text-anchor="middle" fill="#fb923c" font-size="12" font-weight="bold">DMZ Publique</text>
  <text x="480" y="88" text-anchor="middle" fill="#334155" font-size="10">66.6.6.4/30</text>
  <text x="480" y="106" text-anchor="middle" fill="#64748b" font-size="11">DNS · HTTP</text>
  <text x="480" y="122" text-anchor="middle" fill="#475569" font-size="10">66.6.6.6</text>

  <!-- ===== RÉSEAU INTERNE (droite) ===== -->
  <rect x="720" y="160" width="210" height="88" rx="8" fill="#0c1628" stroke="#34d399" stroke-width="1.5"/>
  <text x="825" y="192" text-anchor="middle" fill="#34d399" font-size="12" font-weight="bold">Réseau Interne</text>
  <text x="825" y="208" text-anchor="middle" fill="#334155" font-size="10">10.0.0.0/24 · 2001::/64</text>
  <text x="825" y="226" text-anchor="middle" fill="#64748b" font-size="11">Postes clients</text>
  <text x="825" y="242" text-anchor="middle" fill="#475569" font-size="10">10.0.0.2 / 2001::2</text>

  <!-- ===== DMZ PRIVÉE (bas) ===== -->
  <rect x="360" y="360" width="240" height="100" rx="8" fill="#0c1628" stroke="#818cf8" stroke-width="1.5"/>
  <text x="480" y="390" text-anchor="middle" fill="#818cf8" font-size="12" font-weight="bold">DMZ Privée</text>
  <text x="480" y="406" text-anchor="middle" fill="#334155" font-size="10">10.0.1.0/24 · 2001:1:/64</text>
  <text x="480" y="424" text-anchor="middle" fill="#64748b" font-size="11">Serveur SSH</text>
  <text x="480" y="440" text-anchor="middle" fill="#475569" font-size="10">10.0.1.2 / 2001:1::4</text>

  <!-- ===== CONNEXIONS ===== -->
  <!-- Internet → Pare-feu (eth0) -->
  <line x1="162" y1="230" x2="370" y2="230" stroke="#f87171" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr-red)"/>
  <rect x="196" y="212" width="120" height="18" rx="3" fill="#070b14"/>
  <text x="256" y="224" text-anchor="middle" fill="#f87171" font-size="10">ICMP · (HTTP→DMZ)</text>

  <!-- Pare-feu → DMZ Publique (eth1) -->
  <line x1="480" y1="160" x2="480" y2="136" stroke="#fb923c" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="492" y="152" fill="#475569" font-size="10">eth1</text>

  <!-- Pare-feu → Réseau Interne (eth2) -->
  <line x1="590" y1="210" x2="720" y2="210" stroke="#34d399" stroke-width="1.5" marker-end="url(#arr-green)"/>
  <rect x="612" y="194" width="96" height="18" rx="3" fill="#070b14"/>
  <text x="660" y="206" text-anchor="middle" fill="#34d399" font-size="10">eth2 · NAT out</text>

  <!-- Pare-feu → DMZ Privée (eth3) -->
  <line x1="480" y1="300" x2="480" y2="360" stroke="#818cf8" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="492" y="334" fill="#475569" font-size="10">eth3</text>

  <!-- NAT labels -->
  <rect x="32" y="298" width="168" height="54" rx="6" fill="#0a0f1e" stroke="#22d3ee" stroke-width="1" opacity="0.7"/>
  <text x="116" y="318" text-anchor="middle" fill="#22d3ee" font-size="10" font-weight="bold">NAT masquerade</text>
  <text x="116" y="334" text-anchor="middle" fill="#475569" font-size="10">Interne → DMZ pub (eth1)</text>
  <text x="116" y="348" text-anchor="middle" fill="#475569" font-size="10">DMZ privée → Internet (eth0)</text>

  <!-- Suricata rules -->
  <rect x="720" y="296" width="210" height="98" rx="6" fill="#0a0f1e" stroke="#a78bfa" stroke-width="1" opacity="0.8"/>
  <text x="825" y="316" text-anchor="middle" fill="#a78bfa" font-size="10" font-weight="bold">Suricata — Règles IPS</text>
  <text x="736" y="334" fill="#475569" font-size="10">1. DNS → malicious.com → DROP</text>
  <text x="736" y="350" fill="#475569" font-size="10">2. Ping flood &gt;10/s → DROP</text>
  <text x="736" y="366" fill="#475569" font-size="10">3. SSH brute &gt;5/s → DROP</text>
  <text x="825" y="386" text-anchor="middle" fill="#334155" font-size="10">couplé via NFQUEUE</text>

  <!-- Légende politique -->
  <text x="480" y="486" text-anchor="middle" fill="#1e293b" font-size="10" letter-spacing="1">politique par défaut : DROP · filtrage stateful · anti-spoofing · IPv4 + IPv6</text>
</svg>
