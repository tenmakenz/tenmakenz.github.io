name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Un seul déploiement à la fois ; pas d'annulation si un déploiement est en cours
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install, build & upload artifact
        # withastro/action@v3 installe Node, les dépendances, lance `astro build`
        # et uploade l'artifact prêt pour GitHub Pages
        uses: withastro/action@v3
        # Options disponibles (toutes optionnelles) :
        # with:
        #   path: .             # Répertoire racine du projet Astro
        #   node-version: 20    # Version Node.js (défaut : 20)
        #   package-manager: npm@latest

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
